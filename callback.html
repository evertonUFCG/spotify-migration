<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Autorizando...</title>
<style>
  body { background: #0a0a0a; color: #f0f0f0; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; flex-direction: column; gap: 16px; }
  .dot { animation: blink 1s infinite; } .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0} 40%{opacity:1} }
</style>
</head>
<body>
<p style="color:#1DB954;font-size:1.2rem">Autorizando com Spotify</p>
<p><span class="dot">●</span><span class="dot">●</span><span class="dot">●</span></p>
<p style="color:#555;font-size:0.8rem">Esta janela fechará automaticamente...</p>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');
  if (code && window.opener) {
    window.opener.postMessage({ type: 'spotify_callback', code }, '*');
    setTimeout(() => window.close(), 500);
  } else if (error) {
    document.body.innerHTML = '<p style="color:#ff6b6b">Autorização negada. Feche esta janela e tente novamente.</p>';
  } else {
    document.body.innerHTML = '<p style="color:#ff6b6b">Código não encontrado na URL.</p>';
  }
</script>
</body>
</html>
